}@layer base {
  .ion-button-base {
    appearance: none;
    padding: 0;
    background: transparent;
    border: 0;
    border-color: transparent;
    color: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-style: solid;
    border-width: var(--border-width-1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    transition-property: background-color, color, border-color, scale;
    transition-duration: 150ms;
    transition-timing-function: ease-out;
    will-change: scale;
  }

  /* RAC pressed */
  .ion-button-base[data-pressed] {
    scale: 0.95;
  }

  /* Vanilla pressed */
  .ion-button-base:not([data-rac]):active:not(:disabled) {
    scale: 0.95;
  }

  /* RAC disabled */
  .ion-button-base[data-disabled] {
    cursor: not-allowed;
    transition: none;
  }

  /* Vanilla disabled */
  .ion-button-base:not([data-rac]):disabled {
    cursor: not-allowed;
    transition: none;
  }

  /* RAC focus-visible */
  .ion-button-base[data-focus-visible] {
    outline: 2px auto var(--foreground-neutral);
    outline-offset: 4px;
  }

  /* Vanilla focus-visible */
  .ion-button-base:not([data-rac]):focus-visible {
    outline: 2px auto var(--foreground-neutral);
    outline-offset: 4px;
  }

  .ion-button-base:focus:not([data-focus-visible]):not(:focus-visible) {
    outline: none;
  }
}

@layer ion {

    font-weight: 500;
    white-space: nowrap;
    text-decoration: none;

  .ion-btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ion-btn[data-size="s"] .ion-btn-icon {
    width: 16px;
    height: 16px;
  }

  .ion-btn[data-size="m"] .ion-btn-icon {
    width: 20px;
    height: 20px;
  }

  .ion-btn[data-size="l"] .ion-btn-icon {
    width: 24px;
    height: 24px;
  }

  /* --- Vanilla button visual variant states (hover / active / disabled) --- */

  /* Primary */
  .ion-button-base[data-visual="primary"]:not([data-rac]):hover:not(:disabled) {

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {

  background: var(--background-base);

  font-family: var(--ion-font-mono);
}

/* ── Main grid ───────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 280px 1fr;

}

/* ── Sidebar ─────────────────────────────────────────── */

let activeTemplate = 0;
let activeNewTemplate = null;
let selections = {};

function countCombos(tmpl) {
  return tmpl.vars.reduce((acc, v) => acc * SEG_VALUES[v].length, 1);
}

function initSelections(tmpl) {
  const s = {};
  tmpl.vars.forEach(v => { s[v] = 0; });
  return s;
}

// ── Sidebar render ────────────────────────────────────────────────────────
function renderSidebar() {
  // Standard segments
  document.getElementById('seg-type-grid').innerHTML = TEMPLATES.map((t, i) => {
    const active = activeNewTemplate === null && i === activeTemplate;
    return `<li>
      <button class="ion-nav-list-item h-500 px-150 text-s gap-75 w-100${active ? '" aria-current="page" data-current' : '"'}
        onclick="selectTemplate(${i})" style="width:100%;border:none;background:none;cursor:pointer;border-radius:var(--radius-s);">
        <span style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0"></span>
        <span style="flex:1;text-align:left">${t.name}</span>
        <span class="ion-badge rounded-rounded text-xs font-medium px-75 py-25 bg-neutral-faded fg-neutral"
              data-size="m" data-intent="neutral" data-visual="faded">${countCombos(t).toLocaleString()}</span>
      </button>
    </li>`;
  }).join('');

// ── Standard segment render ───────────────────────────────────────────────
function renderOptions(tmpl) {
  document.getElementById('options-panel').innerHTML = tmpl.vars.map(v => {
    const col = SEG_COLORS[v];
    const vals = SEG_VALUES[v];
    const selIdx = selections[v] || 0;
    return `<div>
      <div class="option-group-label" style="color:${col.text}">${SEG_LABELS[v]}</div>
      <div class="option-values">
        ${vals.map((val, vi) => `
          <button class="option-btn${vi === selIdx ? ' selected' : ''}"
            style="${vi === selIdx ? `background:${col.bg};color:${col.text};border-color:${col.bar}40` : ''}"
            onclick="selectVal('${v}', ${vi})">${val.label}</button>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

function assembledSentence(tmpl) {
  let s = tmpl.template;
  tmpl.vars.forEach(v => {
    const val = SEG_VALUES[v][selections[v] || 0];
    s = s.replace(v, val.blank ? '' : val.label);
  });
  return s;
}

function renderSentenceDisplay(tmpl) {
  const parts = tmpl.template.split(/(%\{[^}]+\})/g);
  document.getElementById('sentence-display').innerHTML = parts.map(part => {
    const match = tmpl.vars.find(v => v === part);
    if (match) {
      const col = SEG_COLORS[match];
      const val = SEG_VALUES[match][selections[match] || 0];
      if (!val || val.blank) return '';
      return `<span class="seg-chip" style="background:${col.bg};color:${col.text};border-color:${col.bar}40">${val.label}</span>`;
    }
    return `<span>${part}</span>`;
  }).join('');
}

function renderTemplate(tmpl) {
  const parts = tmpl.template.split(/(%\{[^}]+\})/g);
  document.getElementById('template-display').innerHTML = parts.map(part =>
    /%\{[^}]+\}/.test(part) ? `<span class="tvar">${part}</span>` : `<span>${part}</span>`
  ).join('');
}

function renderBreakdown(tmpl) {
  document.getElementById('string-rows').innerHTML = tmpl.vars.map(v => {
    const col = SEG_COLORS[v];
    const val = SEG_VALUES[v][selections[v] || 0];
    const isBlank = val.blank;
    const crowdinUrl = isBlank ? null : CROWDIN_URL(val.label);
    return `
      <div class="string-card">
        <div class="string-card-bar" style="background:${col.bar}"></div>
        <div class="string-card-body">
          <span class="string-card-var">${v}</span>
          <span class="string-card-value${isBlank ? ' blank' : ''}">${isBlank ? '(not applied — no filter)' : val.label}</span>
          <span class="string-card-note">${SEG_NOTES[v]}</span>
        </div>
        <div class="string-card-actions">
          ${!isBlank ? `
            <a href="${crowdinUrl}" target="_blank"
               class="ion-button-base ion-btn rounded-rounded h-400 px-150 text-xs gap-50 bg-accent fg-on-accent border-color-transparent"
               data-size="s" data-visual="primary">Open in Crowdin ↗</a>
            <button class="ion-button-base ion-btn rounded-rounded h-400 px-150 text-xs gap-50 bg-transparent fg-neutral border-color-neutral"
               data-size="s" data-visual="secondary"
               onclick="copyStr('${val.label.replace(/'/g, "\\'")}'.replace(/&amp;/g,'&'), this)">Copy</button>
          ` : `<span style="font-size:var(--font-size-xs);color:var(--foreground-ghost)">Blank / no filter</span>`}
        </div>
      </div>`;
  }).join('');
}

function renderComboCount(tmpl) {
  const n = countCombos(tmpl);
  document.getElementById('combo-badge').textContent = n.toLocaleString() + ' combinations';
}

function render() {
  const tmpl = TEMPLATES[activeTemplate];
  renderSidebar();
  renderOptions(tmpl);
  renderTemplate(tmpl);
  renderSentenceDisplay(tmpl);
  renderBreakdown(tmpl);
  renderComboCount(tmpl);
}

function selectTemplate(i) {
  activeNewTemplate = null;
  activeTemplate = i;
  selections = initSelections(TEMPLATES[i]);
  render();
}

function selectVal(varName, idx) {
  selections[varName] = idx;
  const tmpl = TEMPLATES[activeTemplate];
  renderOptions(tmpl);
  renderSentenceDisplay(tmpl);
  renderBreakdown(tmpl);
}

function selectNewTemplate(i) {
  activeNewTemplate = i;
  render_new(i);

  document.getElementById('combo-badge').textContent = strings.length + ' strings';

  document.getElementById('options-panel').innerHTML =
    `<div style="color:var(--foreground-ghost);font-size:var(--font-size-xs);padding:var(--spacing-100) 0;line-height:var(--line-height-s)">
      UI labels — no composable values
    </div>`;

  document.getElementById('string-rows').innerHTML = strings.map(s => `
    <div class="string-card">
      <div class="string-card-bar" style="background:${tmpl.color}"></div>
      <div class="string-card-body">
        <span class="string-card-var" style="color:${tmpl.color}">${tmpl.group}</span>
        <span class="string-card-value">${s.text}</span>
        <span class="string-card-note">ID: ${s.id}</span>
      </div>
      <div class="string-card-actions">
        <a href="${NEW_STRING_URL(s.id)}" target="_blank"
           class="ion-button-base ion-btn rounded-rounded h-400 px-150 text-xs gap-50 bg-accent fg-on-accent border-color-transparent"
           data-size="s" data-visual="primary">Open in Crowdin ↗</a>
        <button class="ion-button-base ion-btn rounded-rounded h-400 px-150 text-xs gap-50 bg-transparent fg-neutral border-color-neutral"
           data-size="s" data-visual="secondary"
           onclick="copyStr('${s.text.replace(/'/g, "\\'")}'.replace(/&amp;/g,'&'), this)">Copy</button>
      </div>
    </div>
  `).join('');
}

// ── Utils ─────────────────────────────────────────────────────────────────
function copyStr(str, btn) {
  navigator.clipboard.writeText(str).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--foreground-accent)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  });
}

// Init
selectTemplate(0);
</script>
</body>
</html>
