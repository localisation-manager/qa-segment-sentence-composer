}@layer base {
  .ion-button-base {
    appearance: none;
    padding: 0;
    background: transparent;
    border: 0;
    border-color: transparent;
    color: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-style: solid;
    border-width: var(--border-width-1);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    transition-property: background-color, color, border-color, scale;
    transition-duration: 150ms;
    transition-timing-function: ease-out;
    will-change: scale;
  }

  /* RAC pressed */
  .ion-button-base[data-pressed] {
    scale: 0.95;
  }

  /* Vanilla pressed */
  .ion-button-base:not([data-rac]):active:not(:disabled) {
    scale: 0.95;
  }

  /* RAC disabled */
  .ion-button-base[data-disabled] {
    cursor: not-allowed;
    transition: none;
  }

  /* Vanilla disabled */
  .ion-button-base:not([data-rac]):disabled {
    cursor: not-allowed;
    transition: none;
  }

  /* RAC focus-visible */
  .ion-button-base[data-focus-visible] {
    outline: 2px auto var(--foreground-neutral);
    outline-offset: 4px;
  }

  /* Vanilla focus-visible */
  .ion-button-base:not([data-rac]):focus-visible {
    outline: 2px auto var(--foreground-neutral);
    outline-offset: 4px;
  }

  .ion-button-base:focus:not([data-focus-visible]):not(:focus-visible) {
    outline: none;
  }
}

@layer ion {

    font-weight: 500;
    white-space: nowrap;
    text-decoration: none;

  .ion-btn-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .ion-btn[data-size="s"] .ion-btn-icon {
    width: 16px;
    height: 16px;
  }

  .ion-btn[data-size="m"] .ion-btn-icon {
    width: 20px;
    height: 20px;
  }

  .ion-btn[data-size="l"] .ion-btn-icon {
    width: 24px;
    height: 24px;
  }

  /* --- Vanilla button visual variant states (hover / active / disabled) --- */

  /* Primary */
  .ion-button-base[data-visual="primary"]:not([data-rac]):hover:not(:disabled) {

};

// Expand inner %{} in a label to their selected fill-in values (returns HTML)
function expandInnerVars(label) {
  return label.replace(/%\{([^}]+)\}/g, (match) => {
    const iv = INNER_VARS[match];
    if (!iv) return match;
    const idx = innerSelections[match] || 0;
    const val = iv.values[idx];
    return `<span style="background:${iv.color.bg};color:${iv.color.text};border:1px solid ${iv.color.bar}40;padding:1px 6px;border-radius:4px;font-weight:500">${val}</span>`;
  });
}

// Get list of inner vars active in currently selected values
function getActiveInnerVars(tmpl) {
  const active = new Set();
  tmpl.vars.forEach(v => {
    const val = (SEG_VALUES[v]||[])[selections[v]||0];
    if (val && val.hasVar && val.label) {
      const matches = val.label.matchAll(/%\{([^}]+)\}/g);
      for (const m of matches) {
        const key = '%{' + m[1] + '}';
        if (INNER_VARS[key]) active.add(key);
      }
    }
  });
  return [...active];
}

// ── State ──────────────────────────────────────────────────────────────────
let activeTemplate = 0;
let activeRefCard = -1;
let selections = {};
let innerSelections = {};

function countCombos(tmpl) {
  return tmpl.vars.reduce((acc, v) => acc * (SEG_VALUES[v] || [1]).length, 1);
}
function initSelections(tmpl) {
  const s = {};
  tmpl.vars.forEach(v => { s[v] = 0; });
  return s;
}
function initInnerSelections() {
  const s = {};
  Object.keys(INNER_VARS).forEach(k => { s[k] = 0; });
  return s;
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function navItem(name, color, badge, absIdx, active) {
  return `<li>
    <button class="ion-nav-list-item h-500 px-150 text-s gap-75${active ? '" aria-current="page" data-current' : '"'}
      onclick="selectTemplate(${absIdx})"
      style="width:100%;border:none;background:none;cursor:pointer;border-radius:var(--radius-s);font-family:var(--ion-font-body)">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></span>
      <span style="flex:1;text-align:left;color:var(--foreground-neutral)">${name}</span>
      <span class="ion-badge rounded-rounded text-xs font-medium px-75 py-25 bg-neutral-faded fg-neutral">${badge}</span>
    </button>
  </li>`;
}

function renderSidebar() {
  const custStart = TEMPLATES.findIndex(t => t.section === 'custom');
  const descStart = TEMPLATES.findIndex(t => t.section === 'description');
  const stdEnd = custStart === -1 ? (descStart === -1 ? TEMPLATES.length : descStart) : custStart;
  const custEnd = descStart === -1 ? TEMPLATES.length : descStart;
  const stdTemplates = TEMPLATES.slice(0, stdEnd);
  const custTemplates = custStart === -1 ? [] : TEMPLATES.slice(custStart, custEnd);
  const descTemplates = descStart === -1 ? [] : TEMPLATES.slice(descStart);

  document.getElementById('seg-type-grid').innerHTML = stdTemplates.map((t, i) =>
    navItem(t.name, t.color, countCombos(t).toLocaleString(), i, activeTemplate === i)
  ).join('');

  document.getElementById('new-seg-grid').innerHTML = custTemplates.map((t, i) =>
    navItem(t.name, t.color, countCombos(t).toLocaleString(), custStart + i, activeTemplate === custStart + i)
  ).join('');

  document.getElementById('desc-seg-grid').innerHTML = descTemplates.map((t, i) =>
    navItem(t.name, t.color, countCombos(t).toLocaleString(), descStart + i, activeTemplate === descStart + i)
  ).join('');

  document.getElementById('ref-grid').innerHTML = NEW_TEMPLATES.map((t, i) => {
    const strings = NEW_STRINGS[t.group] || [];
    const isActive = activeRefCard === i;
    return `<li>
      <button class="ion-nav-list-item h-500 px-150 text-s gap-75${isActive ? '" aria-current="page" data-current' : '"'}
        onclick="selectRefCard(${i})"
        style="width:100%;border:none;background:none;cursor:pointer;border-radius:var(--radius-s);font-family:var(--ion-font-body)">
        <span style="width:8px;height:8px;border-radius:50%;background:${t.color};flex-shrink:0"></span>
        <span style="flex:1;text-align:left;color:var(--foreground-neutral)">${t.name}</span>
        <span class="ion-badge rounded-rounded text-xs font-medium px-75 py-25 bg-neutral-faded fg-neutral">${strings.length}</span>
      </button>
    </li>`;
  }).join('');

}

// ── Render helpers ─────────────────────────────────────────────────────────
function renderOptions(tmpl) {
  let html = tmpl.vars.map(v => {
    const col = SEG_COLORS[v] || { bg:'#333',text:'#ccc',bar:'#888' };
    const vals = SEG_VALUES[v] || [];
    const selIdx = selections[v] || 0;
    return `<div>
      <div class="option-group-label" style="color:${col.text}">${SEG_LABELS[v] || v}</div>
      <div class="option-values">
        ${vals.map((val, vi) => `
          <button class="option-btn${vi===selIdx?' selected':''}"
            style="${vi===selIdx?`background:${col.bg};color:${col.text};border-color:${col.bar}40`:''}"
            onclick="selectVal('${v}',${vi})">${val.label}</button>
        `).join('')}
      </div>
    </div>`;
  }).join('');

  // Inner variable fill-in groups (for %{count}, %{unit}, %{value}, etc.)
  const innerVars = getActiveInnerVars(tmpl);
  if (innerVars.length > 0) {
    html += `<div style="border-top:1px solid var(--border-neutral-faded);margin:16px 0 12px"></div>`;
    html += `<div style="color:var(--foreground-neutral-faded);font-size:var(--font-size-2xs);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;font-weight:600">Fill-in values</div>`;
    innerVars.forEach(iv => {
      const cfg = INNER_VARS[iv];
      const selIdx = innerSelections[iv] || 0;
      html += `<div>
        <div class="option-group-label" style="color:${cfg.color.text}">${cfg.label} <span style="opacity:.5;font-size:var(--font-size-2xs)">${iv}</span></div>
        <div class="option-values">
          ${cfg.values.map((val, vi) => `
            <button class="option-btn${vi===selIdx?' selected':''}"
              style="${vi===selIdx?`background:${cfg.color.bg};color:${cfg.color.text};border-color:${cfg.color.bar}40`:''}"
              onclick="selectInnerVal('${iv}',${vi})">${val}</button>
          `).join('')}
        </div>
      </div>`;
    });
  }

  document.getElementById('options-panel').innerHTML = html;
}

function renderSentenceDisplay(tmpl) {
  const parts = tmpl.template.split(/(%\{[^}]+\})/g);
  document.getElementById('sentence-display').innerHTML = parts.map(part => {
    const match = tmpl.vars.find(v => v === part);
    if (match) {
      const col = SEG_COLORS[match] || { bg:'#333',text:'#ccc',bar:'#888' };
      const val = (SEG_VALUES[match]||[])[selections[match]||0];
      if (!val || val.blank) return '';
      let exSuffix = val.example ? `<span style="opacity:.5;font-style:italic;margin-left:6px">${val.example}</span>` : '';
      if (val.exampleAfter) {
        const andCol = SEG_COLORS['%{andConn}'] || { bg:'#082B26',text:'#23A99D',bar:'#0D9488' };
        exSuffix += `<span class="seg-chip" style="background:${andCol.bg};color:${andCol.text};border-color:${andCol.bar}40;margin-left:6px">and</span><span style="opacity:.5;font-style:italic;margin-left:6px">${val.exampleAfter}</span>`;
      }
      const chipContent = val.hasVar ? expandInnerVars(val.label) : val.label;
      return `<span class="seg-chip" style="background:${col.bg};color:${col.text};border-color:${col.bar}40">${chipContent}</span>${exSuffix}`;
    }
    if (part.trim()) return `<span>${part}</span>`;
    return '';
  }).join('');
}

function renderTemplate(tmpl) {
  const parts = tmpl.template.split(/(%\{[^}]+\})/g);
  document.getElementById('template-display').innerHTML = parts.map(part =>
    /%\{[^}]+\}/.test(part)
      ? `<span class="tvar">${part}</span>`
      : `<span>${part}</span>`
  ).join('');
}

function renderBreakdown(tmpl) {
  let html = '';

  // 1. Full template string card (only show if it has a Crowdin link)
  const tmplUrl = ALL_CROWDIN(tmpl.template);
  const tmplFallback = 'https://fresha.crowdin.com/u/projects/25';
  if (tmplUrl !== tmplFallback) {
    html += `
      <div class="string-card">
        <div class="string-card-bar" style="background:${tmpl.color}"></div>
        <div class="string-card-body">
          <span class="string-card-var" style="color:${tmpl.color}">Full template</span>
          <span class="string-card-value" style="font-size:var(--font-size-xs)">${tmpl.template}</span>
          <span class="string-card-note">The complete sentence template string in Crowdin.</span>
        </div>
        <div class="string-card-actions">
          <a href="${tmplUrl}" target="_blank"
             class="ion-button-base ion-btn rounded-s px-150 py-75 text-xs gap-50 bg-accent fg-on-accent border-color-transparent"
             data-visual="primary" style="border-radius:var(--radius-s);line-height:1.3;height:auto;min-height:var(--size-400)">
             Open in Crowdin ↗
           </a>
          <button class="ion-button-base ion-btn rounded-s px-150 py-75 text-xs gap-50 bg-transparent fg-neutral border-color-neutral"
            data-visual="secondary" style="border-radius:var(--radius-s);line-height:1.3;height:auto;min-height:var(--size-400)"
            onclick="copyStr('${tmpl.template.replace(/'/g,"\\'")}', this)">Copy</button>
        </div>
      </div>`;
  }

  // 2. Static text fragment cards (only show if they have a Crowdin link)
  const fallbackUrl = 'https://fresha.crowdin.com/u/projects/25';
  const staticParts = tmpl.template.split(/(%\{[^}]+\})/g).filter(p => !/%\{[^}]+\}/.test(p) && p.trim());
  const seenStatic = new Set();
  staticParts.forEach(part => {
    const text = part.trim();
    if (!text || seenStatic.has(text)) return;
    seenStatic.add(text);
    const url = ALL_CROWDIN(text);
    if (url === fallbackUrl) return; // skip cards with no Crowdin link
    html += `
      <div class="string-card">
        <div class="string-card-bar" style="background:var(--foreground-ghost)"></div>
        <div class="string-card-body">
          <span class="string-card-var" style="color:var(--foreground-neutral-faded)">Static text</span>
          <span class="string-card-value">${text}</span>
        </div>
        <div class="string-card-actions">
          <a href="${url}" target="_blank"
             class="ion-button-base ion-btn rounded-s px-150 py-75 text-xs gap-50 bg-accent fg-on-accent border-color-transparent"
             data-visual="primary" style="border-radius:var(--radius-s);line-height:1.3;height:auto;min-height:var(--size-400)">
             Open in Crowdin ↗
           </a>
          <button class="ion-button-base ion-btn rounded-s px-150 py-75 text-xs gap-50 bg-transparent fg-neutral border-color-neutral"
            data-visual="secondary" style="border-radius:var(--radius-s);line-height:1.3;height:auto;min-height:var(--size-400)"
            onclick="copyStr('${text.replace(/'/g,"\\'")}', this)">Copy</button>
        </div>
      </div>`;
  });

  // 3. Variable value cards (existing behavior)
  html += tmpl.vars.map(v => {
    const col = SEG_COLORS[v] || { bg:'#333',text:'#ccc',bar:'#888' };
    const val = (SEG_VALUES[v]||[])[selections[v]||0];
    if (!val) return '';
    const isBlank = val.blank;
    const url = ALL_CROWDIN(val.label);
    return `
      <div class="string-card">
        <div class="string-card-bar" style="background:${col.bar}"></div>
        <div class="string-card-body">
          <span class="string-card-var">${v}</span>
          <span class="string-card-value${isBlank?' blank':''}">
            ${isBlank ? '(not applied)' : val.label}
          </span>
          <span class="string-card-note">${SEG_NOTES[v]||''}</span>
        </div>
        <div class="string-card-actions">
          ${isBlank
            ? `<span style="font-size:var(--font-size-xs);color:var(--foreground-ghost)">Blank / no filter</span>`
            : `<a href="${url}" target="_blank"
                 class="ion-button-base ion-btn rounded-s px-150 py-75 text-xs gap-50 bg-accent fg-on-accent border-color-transparent"
                 data-visual="primary" style="border-radius:var(--radius-s);line-height:1.3;height:auto;min-height:var(--size-400)">
                 Open in Crowdin ↗
               </a>
               <button class="ion-button-base ion-btn rounded-s px-150 py-75 text-xs gap-50 bg-transparent fg-neutral border-color-neutral"
                 data-visual="secondary" style="border-radius:var(--radius-s);line-height:1.3;height:auto;min-height:var(--size-400)"
                 onclick="copyStr('${val.label.replace(/'/g,"\\'")}', this)">Copy</button>`
          }
        </div>
      </div>`;
  }).join('');

  // 4. Inner variable fill-in cards (for %{count}, %{unit}, %{value}, etc.)
  const innerVars = getActiveInnerVars(tmpl);
  if (innerVars.length > 0) {
    html += `<div style="border-top:1px solid var(--border-neutral-faded);margin:16px 0 8px;padding-top:12px">
      <span style="color:var(--foreground-neutral-faded);font-size:var(--font-size-2xs);text-transform:uppercase;letter-spacing:0.05em;font-weight:600">Fill-in values (runtime placeholders)</span>
    </div>`;
    innerVars.forEach(iv => {
      const cfg = INNER_VARS[iv];
      const selIdx = innerSelections[iv] || 0;
      const val = cfg.values[selIdx];
      const url = ALL_CROWDIN(val);
      const fallbackUrl = 'https://fresha.crowdin.com/u/projects/25';
      const hasUrl = url !== fallbackUrl;
      html += `
        <div class="string-card">
          <div class="string-card-bar" style="background:${cfg.color.bar}"></div>
          <div class="string-card-body">
            <span class="string-card-var" style="color:${cfg.color.text}">${iv}</span>
            <span class="string-card-value">${val}</span>
            <span class="string-card-note">${cfg.note}</span>
          </div>
          <div class="string-card-actions">
            ${hasUrl
              ? `<a href="${url}" target="_blank"
                   class="ion-button-base ion-btn rounded-s px-150 py-75 text-xs gap-50 bg-accent fg-on-accent border-color-transparent"
                   data-visual="primary" style="border-radius:var(--radius-s);line-height:1.3;height:auto;min-height:var(--size-400)">
                   Open in Crowdin ↗
                 </a>`
              : `<span style="font-size:var(--font-size-xs);color:var(--foreground-ghost)">Runtime value</span>`
            }
          </div>
        </div>`;
    });
  }

  document.getElementById('string-rows').innerHTML = html;
}

function renderComboCount(tmpl) {
  document.getElementById('combo-badge').textContent = countCombos(tmpl).toLocaleString() + ' combinations';
}


function render() {
  if (activeRefCard >= 0) { selectRefCard(activeRefCard); return; }
  const tmpl = TEMPLATES[activeTemplate];
  renderSidebar();
  renderOptions(tmpl);
  renderTemplate(tmpl);
  renderSentenceDisplay(tmpl);
  renderBreakdown(tmpl);
  renderComboCount(tmpl);
}

function selectTemplate(i) {
  activeTemplate = i;
  activeRefCard = -1;
  selections = initSelections(TEMPLATES[i]);
  innerSelections = initInnerSelections();
  render();
}

function selectRefCard(i) {
  activeRefCard = i;
  activeTemplate = -1;
  const ref = NEW_TEMPLATES[i];
  const strings = NEW_STRINGS[ref.group] || [];

  renderSidebar();

  // Template bar: show context label
  document.getElementById('template-display').innerHTML =
    `<span class="tvar" style="color:${ref.color}">${ref.group}</span>`;

  // Sentence area: show note
  document.getElementById('sentence-display').innerHTML =
    `<span style="color:var(--foreground-neutral-faded)">${ref.note}</span>`;

  document.getElementById('combo-badge').textContent = strings.length + ' strings';

  // Options: none
  document.getElementById('options-panel').innerHTML = '';

  // Breakdown: list all strings with Crowdin links and usage
  const USAGE_MAP = {
    'From': 'Start value of a numeric or date range',
    'To':   'End value of a numeric or date range',
    'Unit': 'Unit selector for compound conditions (e.g. months, days, years)',
    'Clients with': 'Prefix of the first rule',
    'where': 'Prefix of sub-conditions within a rule',
    'and': 'Connector between conditions / rules',
  };
  document.getElementById('string-rows').innerHTML = strings.map(s => {
    const url = ALL_CROWDIN(s.text);
    const usage = USAGE_MAP[s.text] || '';
    return `
      <div class="string-card">
        <div class="string-card-bar" style="background:${ref.color}"></div>
        <div class="string-card-body">
          <span class="string-card-var" style="color:${ref.color}">${ref.group}</span>
          <span class="string-card-value">${s.text}</span>
          ${usage ? `<span class="string-card-note">${usage}</span>` : ''}
          ${url !== 'https://fresha.crowdin.com/u/projects/25'
            ? `<a class="crowdin-link" href="${url}" target="_blank" rel="noopener">Open in Crowdin ↗</a>`
            : ''}
        </div>
      </div>`;
  }).join('');
}

function selectVal(varName, idx) {
  selections[varName] = idx;
  const tmpl = TEMPLATES[activeTemplate];
  renderOptions(tmpl);
  renderSentenceDisplay(tmpl);
  renderBreakdown(tmpl);
}

function selectInnerVal(varName, idx) {
  innerSelections[varName] = idx;
  const tmpl = TEMPLATES[activeTemplate];
  renderOptions(tmpl);
  renderSentenceDisplay(tmpl);
  renderBreakdown(tmpl);
}

function copyStr(str, btn) {
  navigator.clipboard.writeText(str).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--foreground-accent)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500);
  });
}

selectTemplate(0);
</script>
</body>
</html>
